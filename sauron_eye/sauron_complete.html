<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sauron - Cinematic Eye</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020000;
        font-family: "Segoe UI", sans-serif;
      }

      /* Cinematic Container (Fixed 1920x1080) */
      #scene-container {
        width: 1920px;
        height: 1080px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform-origin: center center;
        background: #020000;
        overflow: hidden;
      }

      /* Layer 0: Stormy Sky */
      #background-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(circle at 50% 18%, rgba(90, 30, 10, 0.55), rgba(12, 4, 3, 0.9) 52%, rgba(2, 0, 0, 1) 80%),
          radial-gradient(circle at 50% 120%, rgba(120, 40, 12, 0.35), rgba(4, 1, 1, 1) 70%);
      }
      #background-layer::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.18;
        mix-blend-mode: screen;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.5'/></svg>");
      }

      /* Layer 1: Tower */
      #tower-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      /* Layer 2: Lightning */
      #lightning-canvas {
        position: absolute;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      /* Layer 3: Eye */
      #eye-layer {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      #ui-layer {
        position: absolute;
        bottom: 28px;
        width: 100%;
        text-align: center;
        z-index: 20;
        color: #842;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-shadow: 0 0 10px #f00;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="scene-container">
      <div id="background-layer"></div>
      <img id="tower-layer" src="Tower.png" alt="Barad-dûr" />
      <canvas id="lightning-canvas" width="1920" height="1080"></canvas>
      <div id="eye-layer"></div>
      <div id="ui-layer">Arrows to Look | Space to Focus</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      const CONTAINER = document.getElementById("scene-container");
      const EYE_CONTAINER = document.getElementById("eye-layer");
      const lightningCanvas = document.getElementById("lightning-canvas");
      const lightningCtx = lightningCanvas.getContext("2d");

      const WIDTH = 1920;
      const HEIGHT = 1080;

      // --- THREE.JS SETUP ---
      const renderer = new THREE.WebGLRenderer({
        antialias: false,
        alpha: true,
      });
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      EYE_CONTAINER.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(40, WIDTH / HEIGHT, 0.1, 100);
      camera.position.set(0, 0, 7.5);

      // --- EYE GEOMETRY ---
      const geometry = new THREE.SphereGeometry(1.4, 256, 256);
      const uniforms = {
        uTime: { value: 0 },
        uPupilScale: { value: 0.08 },
        uFocus: { value: 0 },
      };

      const material = new THREE.ShaderMaterial({
        uniforms,
        transparent: true,
        vertexShader: `
          varying vec2 vUv;
          varying vec3 vPos;
          varying vec3 vNormal;

          uniform float uTime;

          vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
          vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
          vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
          vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
          float snoise(vec3 v) {
            const vec2  C = vec2(1.0/6.0, 1.0/3.0);
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute(permute(permute(
                  i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 0.142857142857;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ * ns.x + ns.yyyy;
            vec4 y = y_ * ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0) * 2.0 + 1.0;
            vec4 s1 = floor(b1) * 2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
          }

          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vPos = position;

            float noise = snoise(position * 2.5 + vec3(uTime * 0.6));
            float displacement = noise * 0.04;

            vec3 newPos = position + normal * displacement;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform float uPupilScale;
          uniform float uFocus;

          varying vec2 vUv;
          varying vec3 vPos;
          varying vec3 vNormal;

          float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
          }
          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f*f*(3.0-2.0*f);
            return mix( mix( hash( i + vec2(0.0,0.0) ), hash( i + vec2(1.0,0.0) ), u.x),
                        mix( hash( i + vec2(0.0,1.0) ), hash( i + vec2(1.0,1.0) ), u.x), u.y);
          }
          float fbm(vec2 p) {
            float f = 0.0;
            f += 0.50000*noise( p ); p = p*2.02;
            f += 0.25000*noise( p ); p = p*2.03;
            f += 0.12500*noise( p ); p = p*2.01;
            f += 0.06250*noise( p );
            return f;
          }

          void main() {
            vec3 n = normalize(vNormal);
            vec2 centered = vUv - 0.5;
            float angle = atan(centered.y, centered.x);
            float dist = length(centered);
            float radial = dist;
            float wrapAngle = atan(n.y, n.x);
            float wrapDist = length(vec2(n.x, n.y));
            float frontFactor = smoothstep(0.0, 0.5, n.z);
            float fireAngle = mix(wrapAngle, angle, frontFactor);
            float fireRadial = mix(wrapDist, radial, frontFactor);

            float speed = uTime * (0.6 + uFocus * 1.6);
            float rays = fbm(vec2(fireAngle * 20.0, fireRadial - speed));
            float streaks = fbm(vec2(fireAngle * 40.0 + speed, fireRadial * 3.0));
            float fireIntensity = rays + streaks * 0.6;

            vec3 colPupilRim = vec3(3.0, 1.5, 0.2);
            vec3 colMid      = vec3(2.2, 0.6, 0.1);
            vec3 colRays     = vec3(1.2, 0.1, 0.0);
            vec3 colChar     = vec3(0.0, 0.0, 0.0);

            vec3 color = mix(colPupilRim, colMid, smoothstep(0.0, 0.5, fireRadial));
            color = mix(color, colRays, smoothstep(0.2, 0.8, fireRadial + fireIntensity * 0.35));
            color = mix(color, colChar, smoothstep(0.6, 1.0, fireRadial + fireIntensity * 0.25));

            float sparkleNoise = noise(vec2(fireAngle * 30.0 + speed * 2.0, fireRadial * 6.0));
            float sparkleMask = step(0.92, sparkleNoise) * (1.0 - smoothstep(0.35, 0.7, fireRadial));
            color += vec3(1.8, 1.0, 0.3) * sparkleMask;

            float pW = uPupilScale * 0.5;
            float pH = 0.45;
            float pupilShape = pow(abs(centered.x / pW), 2.0) + pow(abs(centered.y / pH), 2.0);
            float pupilMask = 1.0 - smoothstep(0.92, 1.0, pupilShape);
            float facing = smoothstep(0.0, 0.2, n.z);
            color *= (1.0 - pupilMask * facing);

            float rim = smoothstep(0.92, 0.98, pupilShape) * facing;
            color += colPupilRim * rim;

            float haloNoise = fbm(vec2(fireAngle * 6.0, fireRadial * 4.0 + uTime * 0.2));
            float halo = pow(smoothstep(0.45, 0.82, fireRadial + haloNoise * 0.12), 2.0);
            color += vec3(1.2, 0.4, 0.05) * halo * 0.8;

            float fresnel = pow(1.0 - dot(n, vec3(0.0, 0.0, 1.0)), 3.0);
            color += vec3(0.6, 0.15, 0.02) * fresnel * 0.45;

            gl_FragColor = vec4(color, 1.0);
          }
        `,
      });

      const eyeMesh = new THREE.Mesh(geometry, material);
      eyeMesh.scale.set(1.0, 1.0, 1.0);
      eyeMesh.rotation.y = -Math.PI / 2;
      eyeMesh.position.set(0, 0.8, 0);
      scene.add(eyeMesh);

      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(WIDTH, HEIGHT),
        2.2,
        0.5,
        0.1
      );
      const composer = new EffectComposer(renderer);
      composer.setSize(WIDTH, HEIGHT);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);

      // --- CONTROLS (Decoupled) ---
      const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
      let isFocused = false;
      const rotationTarget = new THREE.Vector2(-Math.PI / 2, 0);

      window.addEventListener("keydown", (e) => {
        if (e.code in keys) {
          keys[e.code] = true;
          e.preventDefault();
        }
        if (e.code === "Space") {
          isFocused = true;
          e.preventDefault();
        }
      });

      window.addEventListener("keyup", (e) => {
        if (e.code in keys) {
          keys[e.code] = false;
          e.preventDefault();
        }
        if (e.code === "Space") {
          isFocused = false;
          e.preventDefault();
        }
      });

      // --- RESIZE LOGIC ---
      function handleResize() {
        const scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
        CONTAINER.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }
      window.addEventListener("resize", handleResize);
      handleResize();

      // --- LIGHTNING SYSTEM ---
      const bolts = [];
      const maxBolts = 6;
      let lightningTimer = 0;

      function worldToScreen(pos) {
        const projected = pos.clone().project(camera);
        return {
          x: (projected.x * 0.5 + 0.5) * WIDTH,
          y: (-projected.y * 0.5 + 0.5) * HEIGHT,
        };
      }

      function getEyeEdgePoint() {
        const angle = Math.random() * Math.PI * 2;
        const radiusX = 1.4;
        const radiusY = 1.4;
        const localPoint = new THREE.Vector3(
          Math.cos(angle) * radiusX,
          Math.sin(angle) * radiusY,
          0
        );
        const worldPoint = eyeMesh.localToWorld(localPoint);
        return worldToScreen(worldPoint);
      }

      function getBoltTarget() {
        const isLeft = Math.random() < 0.5;
        const x = isLeft
          ? THREE.MathUtils.randFloat(0, WIDTH * 0.2)
          : THREE.MathUtils.randFloat(WIDTH * 0.8, WIDTH);
        const y = THREE.MathUtils.randFloat(0, HEIGHT * 0.4);
        return { x, y };
      }

      function createBolt() {
        const start = getEyeEdgePoint();
        const end = getBoltTarget();
        const segments = 12;
        const points = [];
        for (let i = 0; i <= segments; i += 1) {
          const t = i / segments;
          const jitter = (1.0 - Math.abs(t - 0.5) * 2.0) * 40;
          const px = THREE.MathUtils.lerp(start.x, end.x, t) + THREE.MathUtils.randFloat(-jitter, jitter);
          const py = THREE.MathUtils.lerp(start.y, end.y, t) + THREE.MathUtils.randFloat(-jitter, jitter);
          points.push({ x: px, y: py });
        }
        bolts.push({
          points,
          life: THREE.MathUtils.randFloat(0.08, 0.2),
          age: 0,
          lineWidth: THREE.MathUtils.randFloat(4, 6),
        });
      }

      function updateLightning(dt) {
        lightningTimer += dt;
        if (lightningTimer > 0.15 && bolts.length < maxBolts) {
          lightningTimer = 0;
          if (Math.random() > 0.35) {
            createBolt();
          }
        }

        for (let i = bolts.length - 1; i >= 0; i -= 1) {
          bolts[i].age += dt;
          if (bolts[i].age > bolts[i].life) {
            bolts.splice(i, 1);
          }
        }
      }

      function renderLightning() {
        lightningCtx.clearRect(0, 0, WIDTH, HEIGHT);
        lightningCtx.strokeStyle = "#ffaa33";
        lightningCtx.shadowColor = "#ff4400";
        lightningCtx.shadowBlur = 30;

        bolts.forEach((bolt) => {
          const alpha = 1.0 - bolt.age / bolt.life;
          lightningCtx.globalAlpha = alpha;
          lightningCtx.lineWidth = bolt.lineWidth;
          lightningCtx.beginPath();
          bolt.points.forEach((p, index) => {
            if (index === 0) lightningCtx.moveTo(p.x, p.y);
            else lightningCtx.lineTo(p.x, p.y);
          });
          lightningCtx.stroke();
        });
        lightningCtx.globalAlpha = 1.0;
        lightningCtx.shadowBlur = 0;
      }

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);

        const dt = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        material.uniforms.uTime.value = elapsed;

        const focusTarget = isFocused ? 1 : 0;
        material.uniforms.uFocus.value += (focusTarget - material.uniforms.uFocus.value) * 0.1;
        bloomPass.strength = THREE.MathUtils.lerp(2.2, 3.2, material.uniforms.uFocus.value);

        const breathe = 0.08 + Math.sin(elapsed * 1.5) * 0.01;
        const slit = 0.01;
        const currentPupil = THREE.MathUtils.lerp(breathe, slit, material.uniforms.uFocus.value);
        material.uniforms.uPupilScale.value = currentPupil;

        const rotSpeed = 1.6 * dt;
        if (keys.ArrowLeft) rotationTarget.x += rotSpeed;
        if (keys.ArrowRight) rotationTarget.x -= rotSpeed;
        if (keys.ArrowUp) rotationTarget.y -= rotSpeed;
        if (keys.ArrowDown) rotationTarget.y += rotSpeed;

        eyeMesh.rotation.y += (rotationTarget.x - eyeMesh.rotation.y) * 0.1;
        eyeMesh.rotation.x += (rotationTarget.y - eyeMesh.rotation.x) * 0.1;

        const zPos = THREE.MathUtils.lerp(0, 2.5, material.uniforms.uFocus.value);
        eyeMesh.position.z = zPos;

        updateLightning(dt);
        renderLightning();
        composer.render();
      }

      animate();
    </script>
  </body>
</html>
