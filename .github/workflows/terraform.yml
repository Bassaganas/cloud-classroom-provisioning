name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'iac/**'
      - 'scripts/setup_aws.sh'
      - 'scripts/setup_classroom.sh'
      - '.github/workflows/terraform.yml'
  push:
    branches: ['**']
    paths:
      - 'iac/**'
      - 'scripts/setup_aws.sh'
      - 'scripts/setup_classroom.sh'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt (recursive)
        id: fmt
        run: terraform fmt -check -recursive iac

      - name: Init backend module
        id: backend_init
        run: terraform -chdir=iac/backend/aws init -backend=false

      - name: Validate backend module
        id: backend_validate
        run: terraform -chdir=iac/backend/aws validate

      - name: Init root AWS module
        id: aws_init
        run: terraform -chdir=iac/aws init -backend=false

      - name: Validate root AWS module
        id: aws_validate
        run: terraform -chdir=iac/aws validate

  plan:
    name: Plan AWS Terraform
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init (root AWS module)
        id: init
        run: terraform -chdir=iac/aws init -backend=false

      - name: Terraform plan (no backend)
        id: plan
        run: terraform -chdir=iac/aws plan -no-color -var="environment=dev" | tee /tmp/tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: /tmp/tfplan.txt
          retention-days: 7

      - name: Add PR summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/tfplan.txt', 'utf8');
            const maxLength = 65000;
            const truncated = plan.length > maxLength ? `${plan.slice(0, maxLength)}\n... (truncated)` : plan;
            const body = [
              '## Terraform Plan (`iac/aws`)',
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });