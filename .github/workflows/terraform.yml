name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'iac/**'
      - 'scripts/setup_aws.sh'
      - 'scripts/setup_classroom.sh'
      - 'scripts/setup_azure.sh'
      - '.github/workflows/terraform.yml'
  push:
    branches: ['**']
    paths:
      - 'iac/**'
      - 'scripts/setup_aws.sh'
      - 'scripts/setup_classroom.sh'
      - 'scripts/setup_azure.sh'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt (recursive)
        id: fmt
        run: terraform fmt -check -recursive iac

      - name: Init backend module
        id: backend_init
        run: terraform -chdir=iac/backend/aws init -backend=false

      - name: Validate backend module
        id: backend_validate
        run: terraform -chdir=iac/backend/aws validate

  plan:
    name: Plan AWS Terraform (Validation)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate deployment with setup_classroom.sh --validate-only
        id: validate
        run: |
          ./scripts/setup_classroom.sh \
            --name classroom-dev-pr \
            --cloud aws \
            --region "${AWS_REGION}" \
            --environment dev \
            --validate-only 2>&1 | tee /tmp/validation.log

      - name: Extract Terraform plan from validation log
        run: |
          grep -A 500 "Running Terraform plan" /tmp/validation.log > /tmp/tfplan.txt || echo "Plan not found in log"

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-validation
          path: /tmp/validation.log
          retention-days: 7

      - name: Add PR summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/validation.log', 'utf8');
            const maxLength = 65000;
            const truncated = log.length > maxLength ? `${log.slice(0, maxLength)}\n... (truncated)` : log;
            const body = [
              '## Terraform Validation (PR Workflow)',
              '',
              '<details><summary>Show validation output</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>',
              '',
              '✓ Validation passed with `--validate-only` flag.',
              '> Lambda packaging and Terraform plan validated without deployment.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });