name: Deploy AWS Classroom

on:
  push:
    branches: ['**']
    paths:
      - 'iac/**'
      - 'functions/**'
      - 'scripts/setup_aws.sh'
      - 'scripts/setup_classroom.sh'
      - 'scripts/package_lambda.sh'
      - 'scripts/build_frontend.sh'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (prod requires manual approval)'
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Create or destroy infrastructure'
        required: true
        type: choice
        default: create
        options:
          - create
          - destroy
      workshop:
        description: 'Workshop to deploy'
        required: true
        type: choice
        default: fellowship
        options:
          - fellowship
          - testus_patronus
      classroom_name:
        description: 'Classroom name override (optional)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  branch_smoke:
    if: github.event_name == 'push' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: OIDC identity smoke test
        run: aws sts get-caller-identity

      - name: Validate deploy scripts syntax
        run: |
          bash -n scripts/setup_classroom.sh
          bash -n scripts/setup_aws.sh

  deploy_dev:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-aws-dev
      cancel-in-progress: false
    outputs:
      instance_manager_url: ${{ steps.deploy.outputs.instance_manager_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache Lambda packages
        id: lambda-cache
        uses: actions/cache@v4
        with:
          path: functions/packages
          key: ${{ runner.os }}-lambda-${{ hashFiles('functions/**') }}
          restore-keys: |
            ${{ runner.os }}-lambda-

      - name: Validate leaderboard Lambda artifact
        env:
          LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET }}
          LAMBDA_ARTIFACT_KEY: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
        run: |
          if [ -z "$LAMBDA_ARTIFACT_BUCKET" ]; then
            echo "No LAMBDA_ARTIFACT_BUCKET configured. Will use locally packaged leaderboard_lambda.zip if available."
            exit 0
          fi

          if [ "${#LAMBDA_ARTIFACT_BUCKET}" -lt 3 ]; then
            echo "::error::Invalid LAMBDA_ARTIFACT_BUCKET '$LAMBDA_ARTIFACT_BUCKET'. Bucket name must be at least 3 characters."
            exit 1
          fi

          aws s3api head-object --bucket "$LAMBDA_ARTIFACT_BUCKET" --key "$LAMBDA_ARTIFACT_KEY" >/dev/null
          echo "✓ Found artifact s3://$LAMBDA_ARTIFACT_BUCKET/$LAMBDA_ARTIFACT_KEY"

      - name: Import Secrets Manager secret into Terraform state
        # Pre-flight: reconcile state drift before apply so terraform apply never
        # hits ResourceExistsException on an already-existing secret.
        env:
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_manage_shared_core: 'true'
        run: |
          set -euo pipefail
          REGION="${AWS_REGION}"
          REGION_CODE=$(echo "$REGION" | tr -d '-')
          BACKEND_BUCKET="terraform-state-classroom-shared-${REGION_CODE}"
          BACKEND_TABLE="terraform-locks-classroom-shared"
          STATE_KEY="classroom/dev/terraform.tfstate"
          SECRET_NAME="/classroom/shared-core/dev/deploy"

          cd iac/aws
          terraform init -reconfigure \
            -backend-config="bucket=${BACKEND_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${REGION}" \
            -backend-config="dynamodb_table=${BACKEND_TABLE}" \
            -backend-config="encrypt=true" \
            -no-color >/dev/null

          if ! aws secretsmanager describe-secret --secret-id "$SECRET_NAME" \
               --region "$REGION" >/dev/null 2>&1; then
            echo "Secret $SECRET_NAME does not exist in AWS — no import needed (will be created)."
            exit 0
          fi
          if terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "✓ Secret already in Terraform state — skipping import."
            exit 0
          fi
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$SECRET_NAME" --region "$REGION" \
            --query 'ARN' --output text)
          echo "Importing $SECRET_NAME → $SECRET_ARN"
          terraform import \
            "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
            "$SECRET_ARN"
          if ! terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "::error::Import appeared to succeed but resource is still absent from Terraform state."
            exit 1
          fi
          echo "✓ Secret successfully imported into Terraform state."

      - name: Deploy dev environment
        id: deploy
        env:
          CLASSROOM_NAME: ${{ vars.CLASSROOM_NAME || 'fellowship-dev' }}
          WORKSHOP: ${{ vars.WORKSHOP || 'fellowship' }}
          SKIP_TEMPLATE_PUBLISH: 'true'
          TF_VAR_lambda_artifact_bucket: ${{ vars.LAMBDA_ARTIFACT_BUCKET || '' }}
          TF_VAR_lambda_artifact_key: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_shared_core_key_name: shared-core-deploy
          TF_VAR_manage_shared_core: 'true'
          # Show Terraform warnings and errors only (not debug noise)
          TF_LOG: WARN
        run: |
          set -euo pipefail
          
          SKIP_PKG_FLAG=""
          if [ "${{ steps.lambda-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Lambda packages restored from cache – skipping repackaging"
            SKIP_PKG_FLAG="--skip-packaging"
          fi

          ./scripts/setup_classroom.sh \
            --name "$CLASSROOM_NAME" \
            --cloud aws \
            --region "${AWS_REGION}" \
            --environment dev \
            --workshop "$WORKSHOP" \
            $SKIP_PKG_FLAG || {
            echo "::error::Deployment setup failed. Check logs above for Terraform errors."
            exit 1
          }
          
          # Extract Lambda Function URL from Terraform outputs
          cd iac/aws
          INSTANCE_MANAGER_URL=$(terraform output -raw instance_manager_url 2>/dev/null || true)
          # Strip any ::error:: annotations emitted by setup-terraform wrapper
          INSTANCE_MANAGER_URL=$(echo "$INSTANCE_MANAGER_URL" | grep -v '^::' || true)
          if [ -n "$INSTANCE_MANAGER_URL" ]; then
            echo "instance_manager_url=$INSTANCE_MANAGER_URL" >> "$GITHUB_OUTPUT"
            echo "✓ Instance Manager URL: $INSTANCE_MANAGER_URL"
          else
            echo "⚠ Instance Manager URL not found in outputs"
          fi

  deploy_manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-aws-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache Lambda packages
        id: lambda-cache
        uses: actions/cache@v4
        with:
          path: functions/packages
          key: ${{ runner.os }}-lambda-${{ hashFiles('functions/**') }}
          restore-keys: |
            ${{ runner.os }}-lambda-

      - name: Validate leaderboard Lambda artifact
        env:
          LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET }}
          LAMBDA_ARTIFACT_KEY: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
        run: |
          if [ -z "$LAMBDA_ARTIFACT_BUCKET" ]; then
            echo "No LAMBDA_ARTIFACT_BUCKET configured. Will use locally packaged leaderboard_lambda.zip if available."
            exit 0
          fi

          if [ "${#LAMBDA_ARTIFACT_BUCKET}" -lt 3 ]; then
            echo "::error::Invalid LAMBDA_ARTIFACT_BUCKET '$LAMBDA_ARTIFACT_BUCKET'. Bucket name must be at least 3 characters."
            exit 1
          fi

          aws s3api head-object --bucket "$LAMBDA_ARTIFACT_BUCKET" --key "$LAMBDA_ARTIFACT_KEY" >/dev/null
          echo "✓ Found artifact s3://$LAMBDA_ARTIFACT_BUCKET/$LAMBDA_ARTIFACT_KEY"

      - name: Import Secrets Manager secret into Terraform state
        # Pre-flight: if the deploy secret already exists in AWS but is not tracked
        # in Terraform state (state drift), importing it now prevents the subsequent
        # terraform apply from failing with ResourceExistsException.
        # Only runs when shared-core infra is being managed and action is not destroy.
        if: ${{ (vars.MANAGE_SHARED_CORE == '' || vars.MANAGE_SHARED_CORE == 'true') && inputs.action != 'destroy' }}
        env:
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_manage_shared_core: ${{ vars.MANAGE_SHARED_CORE || 'true' }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          REGION="${AWS_REGION}"
          REGION_CODE=$(echo "$REGION" | tr -d '-')
          BACKEND_BUCKET="terraform-state-classroom-shared-${REGION_CODE}"
          BACKEND_TABLE="terraform-locks-classroom-shared"
          STATE_KEY="classroom/${ENV}/terraform.tfstate"
          SECRET_NAME="/classroom/shared-core/${ENV}/deploy"

          cd iac/aws

          # Initialise Terraform pointing at the correct remote backend for this run.
          # Use -backend-config flags to override the committed backend.tf values so that
          # the region / environment are always correct regardless of what's committed.
          echo "Initialising Terraform backend for import pre-flight..."
          terraform init -reconfigure \
            -backend-config="bucket=${BACKEND_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${REGION}" \
            -backend-config="dynamodb_table=${BACKEND_TABLE}" \
            -backend-config="encrypt=true" \
            -no-color >/dev/null

          # Skip if the secret does not yet exist in AWS (fresh deployment).
          if ! aws secretsmanager describe-secret --secret-id "$SECRET_NAME" \
               --region "$REGION" >/dev/null 2>&1; then
            echo "Secret $SECRET_NAME does not exist in AWS — no import needed (will be created)."
            exit 0
          fi

          # Skip if the resource is already tracked in state.
          if terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "✓ Secret already in Terraform state — skipping import."
            exit 0
          fi

          # Import the pre-existing secret so that terraform apply does not attempt
          # to create it (which would fail with ResourceExistsException).
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$SECRET_NAME" \
            --region "$REGION" \
            --query 'ARN' \
            --output text)
          echo "Importing $SECRET_NAME → $SECRET_ARN"
          terraform import \
            "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
            "$SECRET_ARN"

          # Verify the import actually landed in state.
          if ! terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "::error::Import appeared to succeed but resource is still absent from Terraform state."
            exit 1
          fi
          echo "✓ Secret successfully imported into Terraform state."

      - name: Run deployment action
        env:
          CLASSROOM_NAME: ${{ inputs.classroom_name != '' && inputs.classroom_name || vars.CLASSROOM_NAME || 'fellowship-manual' }}
          SKIP_TEMPLATE_PUBLISH: 'true'
          TF_VAR_lambda_artifact_bucket: ${{ vars.LAMBDA_ARTIFACT_BUCKET || '' }}
          TF_VAR_lambda_artifact_key: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_shared_core_key_name: shared-core-deploy
          # manage_shared_core defaults to true in terraform.tfvars; override to false
          # if this manual run should skip shared-core (e.g. workshop-only deploys).
          TF_VAR_manage_shared_core: ${{ vars.MANAGE_SHARED_CORE || 'true' }}
          # Show Terraform warnings and errors only (not debug noise)
          TF_LOG: WARN
        run: |
          set -euo pipefail
          
          EXTRA_FLAGS=""
          if [ "${{ inputs.action }}" = "destroy" ]; then
            EXTRA_FLAGS="--destroy"
          fi
          if [ "${{ steps.lambda-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Lambda packages restored from cache – skipping repackaging"
            EXTRA_FLAGS="$EXTRA_FLAGS --skip-packaging"
          fi

          ./scripts/setup_classroom.sh \
            --name "$CLASSROOM_NAME" \
            --cloud aws \
            --region "${AWS_REGION}" \
            --environment "${{ inputs.environment }}" \
            --workshop "${{ inputs.workshop }}" \
            $EXTRA_FLAGS || {
            echo "::error::Deployment action failed. Check logs above for Terraform errors."
            exit 1
          }

      - name: Check shared-core health (post-Terraform)
        if: inputs.action != 'destroy'
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          SC_ENV="${ENV}"
          # shared_core_environment now respects the selected environment (dev/staging/prod)
          JENKINS_DOMAIN=$(aws ssm get-parameter \
            --name "/classroom/shared-core/${SC_ENV}/jenkins-domain" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          GITEA_DOMAIN=$(aws ssm get-parameter \
            --name "/classroom/shared-core/${SC_ENV}/gitea-domain" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          if [ -z "$JENKINS_DOMAIN" ]; then
            echo "::notice::No shared-core Jenkins domain configured in SSM. Skipping health check."
            exit 0
          fi

          echo "Checking shared-core health..."
          JENKINS_OK=false
          GITEA_OK=false
          for i in 1 2 3; do
            if curl -sSf "https://${JENKINS_DOMAIN}/login" -o /dev/null --max-time 10 2>/dev/null; then
              JENKINS_OK=true; break
            fi
            sleep 5
          done
          for i in 1 2 3; do
            if curl -sSf "https://${GITEA_DOMAIN}/api/v1/version" -o /dev/null --max-time 10 2>/dev/null; then
              GITEA_OK=true; break
            fi
            sleep 5
          done

          if [ "$JENKINS_OK" = "false" ] || [ "$GITEA_OK" = "false" ]; then
            echo "::warning::Shared-core services are not healthy (Jenkins=$JENKINS_OK, Gitea=$GITEA_OK). Run the deploy-shared-core workflow in the lotr_sut repository to bootstrap Docker + services on the EC2 instance."
          else
            echo "✓ Shared-core healthy: Jenkins at https://${JENKINS_DOMAIN}/ and Gitea at https://${GITEA_DOMAIN}/"
          fi

  # ---------------------------------------------------------------------------
  # Production promotion pipeline (runs only on push to main)
  #
  # Flow:
  #   deploy_dev → e2e_prod_gate (E2E tests against dev URL) → deploy_prod
  #                                                              ↗ (environment: prod)
  #                                                              Manual approval required
  # ---------------------------------------------------------------------------

  e2e_prod_gate:
    name: E2E Gate for Prod Promotion
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [deploy_dev]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ec2-manager/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 manager password (dev)
        run: |
          SECRET_NAME="classroom/shared/dev/instance-manager/password"
          echo "Resolving password from: $SECRET_NAME"
          SECRET_VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" \
            --query SecretString \
            --output text)
          if [ -z "$SECRET_VALUE" ] || [ "$SECRET_VALUE" = "None" ]; then
            echo "::error::Failed to resolve EC2 manager password from $SECRET_NAME"
            exit 1
          fi
          echo "::add-mask::$SECRET_VALUE"
          echo "E2E_INSTANCE_MANAGER_PASSWORD=$SECRET_VALUE" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: frontend/ec2-manager
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: frontend/ec2-manager
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against deployed dev environment
        run: |
          DEV_URL="${{ needs.deploy_dev.outputs.instance_manager_url }}"
          if [ -z "$DEV_URL" ]; then
            DEV_URL="https://ec2-management-dev.testingfantasy.com"
            echo "⚠ No URL from deploy_dev output, using fallback: $DEV_URL"
          fi
          DEV_URL="${DEV_URL%/}"
          echo "Testing: $DEV_URL"
          cd frontend/ec2-manager
          E2E_BASE_URL="$DEV_URL" \
          E2E_API_URL="https://ec2-management-api-dev.testingfantasy.com/api" \
          E2E_INSTANCE_MANAGER_PASSWORD="$E2E_INSTANCE_MANAGER_PASSWORD" \
          npx playwright test tests/e2e/tutorial-instance-manager.spec.js \
            --reporter=list,html \
            --output=test-results

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-prod-gate-results
          path: frontend/ec2-manager/test-results/
          if-no-files-found: warn

  deploy_prod:
    name: Deploy Production Infrastructure
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [e2e_prod_gate]
    runs-on: ubuntu-latest
    # environment: prod requires a manual approval review in GitHub Environments settings.
    # Configure the "prod" environment with required reviewers in:
    # Repository → Settings → Environments → prod → Required reviewers
    environment: prod
    concurrency:
      group: deploy-aws-prod
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache Lambda packages
        id: lambda-cache
        uses: actions/cache@v4
        with:
          path: functions/packages
          key: ${{ runner.os }}-lambda-${{ hashFiles('functions/**') }}
          restore-keys: |
            ${{ runner.os }}-lambda-

      - name: Validate leaderboard Lambda artifact
        env:
          LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET }}
          LAMBDA_ARTIFACT_KEY: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
        run: |
          if [ -z "$LAMBDA_ARTIFACT_BUCKET" ]; then
            echo "No LAMBDA_ARTIFACT_BUCKET configured. Will use locally packaged artifact if available."
            exit 0
          fi

          if [ "${#LAMBDA_ARTIFACT_BUCKET}" -lt 3 ]; then
            echo "::error::Invalid LAMBDA_ARTIFACT_BUCKET '$LAMBDA_ARTIFACT_BUCKET'. Bucket name must be at least 3 characters."
            exit 1
          fi

          aws s3api head-object --bucket "$LAMBDA_ARTIFACT_BUCKET" --key "$LAMBDA_ARTIFACT_KEY" >/dev/null
          echo "✓ Found artifact s3://$LAMBDA_ARTIFACT_BUCKET/$LAMBDA_ARTIFACT_KEY"

      - name: Import Secrets Manager secret into Terraform state
        # Pre-flight: reconcile state drift before apply so terraform apply never
        # hits ResourceExistsException on an already-existing secret.
        env:
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_manage_shared_core: 'true'
        run: |
          set -euo pipefail
          REGION="${AWS_REGION}"
          REGION_CODE=$(echo "$REGION" | tr -d '-')
          BACKEND_BUCKET="terraform-state-classroom-shared-${REGION_CODE}"
          BACKEND_TABLE="terraform-locks-classroom-shared"
          STATE_KEY="classroom/prod/terraform.tfstate"
          SECRET_NAME="/classroom/shared-core/prod/deploy"

          cd iac/aws
          terraform init -reconfigure \
            -backend-config="bucket=${BACKEND_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${REGION}" \
            -backend-config="dynamodb_table=${BACKEND_TABLE}" \
            -backend-config="encrypt=true" \
            -no-color >/dev/null

          if ! aws secretsmanager describe-secret --secret-id "$SECRET_NAME" \
               --region "$REGION" >/dev/null 2>&1; then
            echo "Secret $SECRET_NAME does not exist in AWS — no import needed (will be created)."
            exit 0
          fi
          if terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "✓ Secret already in Terraform state — skipping import."
            exit 0
          fi
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$SECRET_NAME" --region "$REGION" \
            --query 'ARN' --output text)
          echo "Importing $SECRET_NAME → $SECRET_ARN"
          terraform import \
            "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
            "$SECRET_ARN"
          if ! terraform state show \
               "module.shared_core_secrets[0].aws_secretsmanager_secret.shared_core_deploy" \
               >/dev/null 2>&1; then
            echo "::error::Import appeared to succeed but resource is still absent from Terraform state."
            exit 1
          fi
          echo "✓ Secret successfully imported into Terraform state."

      - name: Deploy prod environment (shared-core + classroom infra)
        env:
          CLASSROOM_NAME: ${{ vars.CLASSROOM_NAME_PROD || vars.CLASSROOM_NAME || 'fellowship' }}
          WORKSHOP: ${{ vars.WORKSHOP || 'fellowship' }}
          SKIP_TEMPLATE_PUBLISH: 'true'
          TF_VAR_lambda_artifact_bucket: ${{ vars.LAMBDA_ARTIFACT_BUCKET || '' }}
          TF_VAR_lambda_artifact_key: ${{ vars.LAMBDA_ARTIFACT_KEY || 'palantir/leaderboard_lambda.zip' }}
          TF_VAR_shared_core_ssh_private_key: ${{ secrets.SHARED_CORE_SSH_PRIVATE_KEY }}
          TF_VAR_shared_core_gh_repo_token: ${{ secrets.SHARED_CORE_GH_REPO_TOKEN }}
          TF_VAR_shared_core_jenkins_admin_password: ${{ secrets.SHARED_CORE_JENKINS_ADMIN_PASSWORD }}
          TF_VAR_shared_core_gitea_admin_password: ${{ secrets.SHARED_CORE_GITEA_ADMIN_PASSWORD }}
          TF_VAR_shared_core_key_name: shared-core-deploy
          TF_VAR_manage_shared_core: 'true'
          # Show Terraform warnings and errors only (not debug noise)
          TF_LOG: WARN
        run: |
          set -euo pipefail
          
          SKIP_PKG_FLAG=""
          if [ "${{ steps.lambda-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Lambda packages restored from cache – skipping repackaging"
            SKIP_PKG_FLAG="--skip-packaging"
          fi

          ./scripts/setup_classroom.sh \
            --name "$CLASSROOM_NAME" \
            --cloud aws \
            --region "${AWS_REGION}" \
            --environment prod \
            --workshop "$WORKSHOP" \
            $SKIP_PKG_FLAG || {
            echo "::error::Production deployment failed. Check logs above for Terraform errors."
            exit 1
          }
