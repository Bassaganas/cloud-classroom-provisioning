name: Playwright E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  push:
    branches: ['**']
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Optional: deployed EC2 Manager base URL (e.g., https://ec2-management-dev.testingfantasy.com). If empty, runs in test mode.'
        required: false
        type: string
        default: 'https://ec2-management-dev.testingfantasy.com'
      aws_environment:
        description: 'AWS environment to resolve instance manager password secret when running against deployed URL'
        required: false
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      password_secret_name:
        description: 'Optional override for Secrets Manager name containing the EC2 Manager password'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ec2-manager/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.test_url != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 manager password from Secrets Manager
        if: ${{ inputs.test_url != '' }}
        run: |
          SECRET_NAME="${{ inputs.password_secret_name }}"
          if [ -z "$SECRET_NAME" ]; then
            TARGET_ENV="${{ inputs.aws_environment }}"
            SECRET_NAME="classroom/shared/${TARGET_ENV}/instance-manager/password"
          fi

          echo "Using password secret: $SECRET_NAME"
          SECRET_VALUE=$(aws secretsmanager get-secret-value --secret-id "$SECRET_NAME" --query SecretString --output text)
          if [ -z "$SECRET_VALUE" ] || [ "$SECRET_VALUE" = "None" ]; then
            echo "Failed to resolve EC2 manager password from secret: $SECRET_NAME"
            exit 1
          fi

          echo "::add-mask::$SECRET_VALUE"
          echo "E2E_INSTANCE_MANAGER_PASSWORD=$SECRET_VALUE" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: frontend/ec2-manager
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: frontend/ec2-manager
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Test Mode or Against Deployed URL)
        run: |
          if [ -n "${{ inputs.test_url }}" ]; then
            echo "Running tests against deployed URL: ${{ inputs.test_url }}"
            cd frontend/ec2-manager
            TEST_URL="${{ inputs.test_url }}"
            TEST_URL="${TEST_URL%/}"
            TARGET_ENV="${{ inputs.aws_environment }}"
            E2E_API_URL="https://ec2-management-api-${TARGET_ENV}.testingfantasy.com/api"
            E2E_BASE_URL="$TEST_URL" E2E_API_URL="$E2E_API_URL" E2E_INSTANCE_MANAGER_PASSWORD="$E2E_INSTANCE_MANAGER_PASSWORD" npx playwright test tests/e2e/tutorial-instance-manager.spec.js --reporter=list,html --output=test-results
            cd ../..
          else
            echo "Running tests in test mode (mock server)"
            ./scripts/run_e2e_tests.sh --install-moto
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/ec2-manager/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/ec2-manager/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload mock API server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mock-api-server-log
          path: /tmp/mock_api_server.log
          retention-days: 7
      
      - name: Print mock API server log on failure
        if: failure()
        run: |
          if [ -f /tmp/mock_api_server.log ]; then
            echo "===== /tmp/mock_api_server.log ====="
            cat /tmp/mock_api_server.log
          else
            echo "No mock API server log file found"
          fi
      - name: Add run summary
        if: always()
        run: |
          {
            echo "## Playwright E2E Results"
            echo ""
            echo "- Workflow status: ${{ job.status }}"
            echo "- HTML report artifact: playwright-report"
            echo "- Raw results artifact: playwright-test-results"
            echo ""
            if [ -n "${{ inputs.test_url }}" ]; then
              echo "✓ Tests ran against deployed URL: ${{ inputs.test_url }}"
            else
              echo "✓ Tests ran in test mode (mock API server)"
            fi
            echo ""
            echo "### How to run tests against deployed EC2 Manager:"
            echo ""
            echo "1. Ensure EC2 Manager is deployed and reachable"
            echo "2. Run this workflow with workflow_dispatch and provide the deployed base URL:"
            echo "   - URL example: \`https://ec2-management-dev.testingfantasy.com\`"
            echo "3. Tests will run against the deployed instance"
            echo ""
            echo "Download artifacts from this workflow run to open the HTML report locally."
          } >> "$GITHUB_STEP_SUMMARY"
