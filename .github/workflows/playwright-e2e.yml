name: Playwright E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  push:
    branches: ['**']
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Optional: Lambda URL to test against (e.g., https://example.lambda-url.eu-west-1.on.aws). If empty, runs in test mode.'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ec2-manager/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend/ec2-manager
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: frontend/ec2-manager
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Test Mode or Against Deployed URL)
        run: |
          if [ -n "${{ inputs.test_url }}" ]; then
            echo "Running tests against deployed URL: ${{ inputs.test_url }}"
            cd frontend/ec2-manager
            VITE_API_URL="${{ inputs.test_url }}/api" npm run test -- --config ../../e2e/playwright.config.js
            cd ../..
          else
            echo "Running tests in test mode (mock server)"
            ./scripts/run_e2e_tests.sh --install-moto
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/ec2-manager/playwright-report
          retention-days: 14

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/ec2-manager/test-results
          retention-days: 14

      - name: Upload mock API server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mock-api-server-log
          path: /tmp/mock_api_server.log
          retention-days: 7

      - name: Add run summary
        if: always()
        run: |
          {
            echo "## Playwright E2E Results"
            echo ""
            echo "- Workflow status: ${{ job.status }}"
            echo "- HTML report artifact: playwright-report"
            echo "- Raw results artifact: playwright-test-results"
            echo ""
            if [ -n "${{ inputs.test_url }}" ]; then
              echo "✓ Tests ran against deployed URL: ${{ inputs.test_url }}"
            else
              echo "✓ Tests ran in test mode (mock API server)"
            fi
            echo ""
            echo "### How to run tests against deployed EC2 Manager:"
            echo ""
            echo "1. After \`deploy-aws.yml\` completes, get the instance_manager_lambda_url output"
            echo "2. Run this workflow with workflow_dispatch and provide the Lambda URL:"
            echo "   - URL example: \`https://abc123.lambda-url.eu-west-1.on.aws\`"
            echo "3. Tests will run against the deployed instance"
            echo ""
            echo "Download artifacts from this workflow run to open the HTML report locally."
          } >> "$GITHUB_STEP_SUMMARY"
