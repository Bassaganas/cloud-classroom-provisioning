name: Playwright E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  push:
    branches: ['**']
    paths:
      - 'frontend/ec2-manager/**'
      - 'scripts/run_e2e_tests.sh'
      - 'scripts/mock_api_server_test_mode.py'
      - '.github/workflows/playwright-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ec2-manager/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend/ec2-manager
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: frontend/ec2-manager
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests in test mode
        run: ./scripts/run_e2e_tests.sh --install-moto

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/ec2-manager/playwright-report
          retention-days: 14

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/ec2-manager/test-results
          retention-days: 14

      - name: Upload mock API server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mock-api-server-log
          path: /tmp/mock_api_server.log
          retention-days: 7

      - name: Add run summary
        if: always()
        run: |
          {
            echo "## Playwright E2E Results"
            echo ""
            echo "- Workflow status: ${{ job.status }}"
            echo "- HTML report artifact: playwright-report"
            echo "- Raw results artifact: playwright-test-results"
            echo ""
            echo "Download artifacts from this workflow run to open the HTML report locally."
          } >> "$GITHUB_STEP_SUMMARY"
