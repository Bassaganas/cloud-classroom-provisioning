# version is obsolete in newer docker-compose versions

services:
  backend:
    build:
      context: ./sut/backend
      dockerfile: Dockerfile
    container_name: fellowship-backend
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
      - ./sut/backend:/app
      # Exclude node_modules and data from volume mount to avoid conflicts
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:////app/data/fellowship.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-https://classroom-open-ai.openai.azure.com/}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2025-04-14}
    working_dir: /app
    command: python app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./sut/frontend
      dockerfile: Dockerfile
    container_name: fellowship-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./sut/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - REACT_APP_API_URL=/api
      - CHOKIDAR_USEPOLLING=true
      - SKIP_PREFLIGHT_CHECK=true
      - DISABLE_ESLINT_PLUGIN=true
      - FAST_REFRESH=false
      - NODE_ENV=development
      - WDS_SOCKET_PORT=443
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PATH=/ws
    command: sh -c "if [ ! -d /app/node_modules ] || [ ! -f /app/node_modules/react-refresh/runtime.js ]; then npm install; fi && npm start"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: fellowship-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Use CADDY_DOMAIN from environment/env file, fallback to localhost for local development
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  backend_data:
    driver: local
  frontend_node_modules:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local