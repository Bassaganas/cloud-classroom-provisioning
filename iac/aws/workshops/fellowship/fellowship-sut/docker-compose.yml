# version is obsolete in newer docker-compose versions

services:
  backend:
    build:
      context: ./sut/backend
      dockerfile: Dockerfile
    container_name: fellowship-backend
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
      - ./sut/backend:/app
      # Exclude node_modules and data from volume mount to avoid conflicts
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:////app/data/fellowship.db
      - SECRET_KEY=dev-secret-key-change-in-production
    working_dir: /app
    command: python app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./sut/frontend
      dockerfile: Dockerfile
    container_name: fellowship-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./sut/frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=/api
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: fellowship-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local