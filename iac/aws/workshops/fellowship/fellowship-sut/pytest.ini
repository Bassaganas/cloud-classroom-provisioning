[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    -v
markers =
    smoke: Smoke tests
    regression: Regression tests
    dark_magic: Tests for dark magic challenges
    api: API endpoint tests
    ui: UI/Playwright tests
